<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient for Matte Squircle -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0D0D11" />
    </linearGradient>
    
    <!-- Neon Emerald Glow Filter -->
    <filter id="emeraldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Shield Outline Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Background Squircle with Matte Border -->
  <rect x="16" y="16" width="480" height="480" rx="130" fill="url(#bgGrad)" stroke="#22222B" stroke-width="12" />

  <!-- Subtle Inner Ring for Matte Depth -->
  <rect x="28" y="28" width="456" height="456" rx="118" fill="none" stroke="#17171C" stroke-width="6" opacity="0.6" />

  <!-- Shield Shape Outline -->
  <path d="M 256, 100 C 375, 100 390, 142 390, 230 C 390, 342 256, 416 256, 416 C 256, 416 122, 342 122, 230 C 122, 142 137, 100 256, 100 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Inner Power Button (Active Glow) -->
  <path d="M 215 230 A 52 52 0 1 0 297 230" 
        fill="none" 
        stroke="#10B981" 
        stroke-width="16" 
        stroke-linecap="round" 
        filter="url(#emeraldGlow)" />

  <!-- Inner Power Line (Active Glow) -->
  <line x1="256" y1="180" x2="256" y2="235" 
        stroke="#10B981" 
        stroke-width="16" 
        stroke-linecap="round" 
        filter="url(#emeraldGlow)" />
</svg>
